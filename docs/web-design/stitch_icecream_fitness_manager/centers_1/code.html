<script>
        let isSheetExpanded = false;
        const sheet = document.getElementById('centerSheet');
        
        function toggleSheet() {
            if (isSheetExpanded) {
                sheet.style.height = '128px'; // 32 * 4px
            } else {
                sheet.style.height = '60%';
            }
            isSheetExpanded = !isSheetExpanded;
        }

        // Simple drag interaction for the sheet handle
        let startY = 0;
        sheet.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });

        sheet.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            if (startY - endY > 50 && !isSheetExpanded) {
                toggleSheet(); // Swipe up
            } else if (endY - startY > 50 && isSheetExpanded) {
                toggleSheet(); // Swipe down
            }
        });
    </script>
