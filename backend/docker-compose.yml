services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: icecream
      POSTGRES_USER: icecream
      POSTGRES_PASSWORD: icecream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icecream -d icecream"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://icecream:icecream@db:5432/icecream
      JWT_SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
