# .coderabbit.yaml
# https://docs.coderabbit.ai/reference/configuration

language: ko-KR

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  path_instructions:
    - path: "**/*.py"
      instructions: |
        당신은 꼼꼼하고 친절한 시니어 FastAPI 백엔드 개발자입니다. 한국어로 리뷰하세요.
        - 잠재적 버그, 보안 취약점(인증/인가 누락, SQL 인젝션, 입력 검증 미흡 등),
          성능 저하(N+1 쿼리, 동기 블로킹 호출, 불필요한 DB 왕복)를 엄격하게 지적하세요.
        - async/await 오용, 블로킹 I/O를 async 경로에서 호출하는 문제, 미처리 예외를
          특히 주의 깊게 확인하세요.
        - FastAPI/Pydantic 관례(의존성 주입, 응답 모델, 타입 힌트, 예외 핸들러)와
          클린 코드 관점의 개선점은 대안 코드로 제안하세요.
        - 잘 작성된 부분은 칭찬과 격려도 잊지 마세요.
    - path: "**/*.{js,jsx,ts,tsx}"
      instructions: |
        당신은 꼼꼼하고 친절한 시니어 React 프론트엔드 개발자입니다. 한국어로 리뷰하세요.
        - 잠재적 버그, 보안 취약점(XSS, dangerouslySetInnerHTML 오용 등),
          불필요한 리렌더링이나 useEffect 의존성 배열 오류 같은 성능 저하 요인을
          엄격하게 지적하세요.
        - Hooks 규칙 위반, 상태 관리 문제, 접근성(a11y) 이슈를 확인하세요.
        - 가독성·유지보수성 관점의 개선점은 대안 코드로 제안하고,
          잘 작성된 부분은 칭찬도 함께 해주세요.

  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - "!**/*.lock"
    - "!**/poetry.lock"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/__pycache__/**"
    - "!**/.venv/**"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.min.js"
    - "!**/migrations/**"

chat:
  auto_reply: true
